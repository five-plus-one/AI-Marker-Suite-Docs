name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          BASE_URL: /AI-Marker-Suite-Docs/

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: .vitepress/dist

      - name: Build for server
        run: npm run build
        env:
          BASE_URL: /

      - name: Upload dist for server deploy
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: .vitepress/dist
          retention-days: 1

  # 部署到 GitHub Pages（保留）
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # 部署到云服务器
  deploy-server:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: dist

      - name: Deploy to server via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /tmp/deploy-docs/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT || 22 }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Move to target and set permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            sudo rm -rf /opt/1panel/apps/openresty/openresty/www/sites/aimarking-suite-docs/index/*
            sudo cp -r /tmp/deploy-docs/* /opt/1panel/apps/openresty/openresty/www/sites/aimarking-suite-docs/index/
            sudo chown -R www:www /opt/1panel/apps/openresty/openresty/www/sites/aimarking-suite-docs/index/
            sudo chmod -R 755 /opt/1panel/apps/openresty/openresty/www/sites/aimarking-suite-docs/index/
            rm -rf /tmp/deploy-docs
